<!doctype html>
<title>Story Choice</title>
<h1>Story Choice</h1>
<p>Start a tiny town mystery and select the next action.</p>
<input id="premise" size="70" placeholder="The bakery begins printing fortunes on its bread.">
<button id="start">Start</button>
<pre id="result"></pre>
<script>
const history = [];
async function play(choice) {
  if (choice) history.push(choice);
  const response = await fetch('/api/turn', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ premise: document.getElementById('premise').value, history }),
  });
  const data = await response.json();
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
}
document.getElementById('start').onclick = () => play();
</script>
