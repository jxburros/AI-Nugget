<!doctype html><title>Prompt Mirror</title><style>body{max-width:700px;margin:3rem auto;font:18px system-ui;background:#18151e;color:#fff}textarea{width:100%;height:160px}button{padding:12px;margin:12px 0}.card{background:#292331;padding:14px;margin:10px 0;border-radius:12px}</style><h1>Prompt Mirror</h1><p>One thought in. Four useful reflections out.</p><textarea id=n></textarea><button onclick="go()">Reflect</button><div id=o></div><script>async function go(){let r=await fetch('/api/reflect',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({note:n.value})}),d=await r.json();o.innerHTML=d.error?d.error:Object.entries(d).map(([k,v])=>'<div class=card><b>'+k+'</b><br>'+v+'</div>').join('')}</script>
