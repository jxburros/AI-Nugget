name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
      - name: Contract tests (Node)
        run: npm test
      - name: Vendorable nugget build
        run: npm run build:nugget

  browser:
    name: Contract tests (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # The core is isomorphic (fetch/ReadableStream/AbortController/TextDecoder
      # only); this job proves the same contract suite in a real browser.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser contract tests
        run: npm run test:browser

  nugget-drift:
    name: Nugget is up to date with src
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build && npm run build:nugget
      - name: Fail if committed dist/ or nugget/ is stale
        run: |
          if [ -n "$(git status --porcelain dist nugget)" ]; then
            echo "::error::dist/ or nugget/ is out of date. Run 'npm run build && npm run build:nugget' and commit the result."
            git --no-pager diff --stat dist nugget
            exit 1
          fi
