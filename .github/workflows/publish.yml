name: Publish

# Publishes @jxburros/ai-handler to GitHub Packages. Manual/release-gated by
# design — this is the primary dependency path for portfolio apps (see
# README.md "Distribution"); the vendorable nugget/ folder remains the
# fallback for repos that can't take a package dependency.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jxburros'
      - run: npm ci
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
